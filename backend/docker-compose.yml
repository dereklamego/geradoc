services:
  postgres:
    image: postgres:16-alpine
    container_name: geradoc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geradoc
    ports:
      - "5432:5432"
    volumes:
      - geradoc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d geradoc"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  geradoc-pgdata:
